name: Publish radar-core package

on:
  workflow_dispatch:
    inputs:
      publish_to_packages:
        description: "Publish the built package to GitHub Packages"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radar-core-dist
          path: dist/

      - name: Publish to GitHub Packages
        if: ${{ github.event_name == 'push' || inputs.publish_to_packages }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -m twine upload \
            --repository-url https://upload.pypi.pkg.github.com/${{ github.repository_owner }} \
            dist/*

      - name: Summarize dry run
        if: ${{ github.event_name == 'workflow_dispatch' && !inputs.publish_to_packages }}
        run: |
          echo "Dry run completed: package was built, validated, and archived without publishing."
